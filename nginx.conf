events {
    worker_connections 1024;
}

http {
    upstream django {
        server 127.0.0.1:8000;
    }

    upstream tornado {
        server 127.0.0.1:9993;
    }

    server {
        listen 8080;
        listen [::]:8080;

        # API requests → Django
        location /api/ {
            # CORS headers (following Zulip's api_headers pattern)
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID, X-Workspace-Id' always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;

            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID, X-Workspace-Id' always;
                add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket → Tornado
        location /api/v1/events {
            # CORS headers for WebSocket endpoint
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID, X-Workspace-Id' always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;

            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID, X-Workspace-Id' always;
                add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://tornado;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # nodl custom endpoints → Django
        location /nodl/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
                add_header Access-Control-Allow-Methods 'GET, POST, DELETE, PUT, PATCH, HEAD, OPTIONS' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User uploads - MUST proxy to Django for auth & X-Accel-Redirect
        location /user_uploads {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
                add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Thumbnails - proxy to Django
        location /thumbnail {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;
                add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal redirect for S3/R2 - used by Django X-Accel-Redirect
        location ~ ^/internal/s3/(?<s3_hostname>[^/]+)/(?<s3_path>.*) {
            internal;
            # Use Cloudflare DNS, IPv4 only (Railway may not have IPv6 connectivity)
            resolver 1.1.1.1 ipv6=off;

            # Critical: Enable SNI (Server Name Indication) for SSL
            # Without this, Cloudflare rejects the connection because it doesn't
            # know which hostname we're requesting (gets IP address only)
            proxy_ssl_server_name on;

            proxy_pass https://$s3_hostname/$s3_path$is_args$args;
            proxy_set_header Host $s3_hostname;
        }

        # Internal redirect for local uploads (fallback)
        location /internal/local/uploads {
            internal;
            alias /app/var/uploads/files;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
