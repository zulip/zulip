# nixpacks.toml - Railway build configuration for nodl-chat
# See: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["python312", "nginx", "supervisor", "postgresql"]

[phases.install]
cmds = [
    "pip install uv",
    "uv sync --frozen --group prod",
    "uv run python manage.py collectstatic --noinput",
]

[phases.build]
cmds = [
    "uv run python manage.py migrate --noinput",
]

[start]
cmd = "uv run supervisord -c /app/supervisord.conf"
